# Picom — lightweight compositor
# xrender backend: works in VNC without OpenGL

backend = "xrender";
vsync = false;

# ── Shadows ───────────────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 20;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-opacity = 0.5;
shadow-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "window_type = 'tooltip'",
    "window_type = 'notification'",
    "name = 'Notification'",
    "class_g = 'tint2'"
];

# ── Fading — disabled for VNC performance ────────────────────────────────────
fading = false;

# ── Opacity ───────────────────────────────────────────────────────────────────
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

# ── General ───────────────────────────────────────────────────────────────────
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = false;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
use-damage = false;
log-level = "warn";
