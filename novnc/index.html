<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linux Desktop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #11111b;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    /*
     * The canvas lives at z-index 0.
     * The status banner lives at z-index 10 BUT with pointer-events:none
     * so it NEVER intercepts mouse/touch input regardless of state.
     */
    #screen {
      position: fixed;
      inset: 0;
    }

    #screen canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #status {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      pointer-events: none;   /* ← never blocks clicks */
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      opacity: 1;
      transition: opacity 0.3s;
    }

    #status.gone { opacity: 0; }

    .spinner {
      width: 32px; height: 32px;
      border: 2.5px solid #313244;
      border-top-color: #89b4fa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #status-text {
      color: #6c7086;
      font-size: 13px;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>

  <!-- VNC canvas — always on top of everything, always receives input -->
  <div id="screen"></div>

  <!-- Status indicator — pointer-events:none so it never steals clicks -->
  <div id="status">
    <div class="spinner" id="spinner"></div>
    <span id="status-text">Connecting…</span>
  </div>

  <script type="module">
    import RFB from './core/rfb.js';

    const status   = document.getElementById('status');
    const spinner  = document.getElementById('spinner');
    const statusTx = document.getElementById('status-text');
    const screen   = document.getElementById('screen');

    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const url   = `${proto}//${location.host}/`;

    const rfb = new RFB(screen, url, {
      credentials: { password: 'password' }
    });

    rfb.scaleViewport  = true;
    rfb.resizeSession  = false;
    rfb.showDotCursor  = true;
    rfb.clipViewport   = false;

    rfb.addEventListener('connect', () => {
      status.classList.add('gone');
      spinner.style.display = 'none';
      statusTx.textContent = '';
    });

    rfb.addEventListener('disconnect', (e) => {
      status.classList.remove('gone');
      spinner.style.display = 'block';
      statusTx.textContent = e.detail.clean
        ? 'Disconnected — refresh to reconnect'
        : 'Connection lost — refresh to retry';
    });

    rfb.addEventListener('credentialsrequired', () => {
      statusTx.textContent = 'Auth failed — check VNC_PASSWORD env var';
      spinner.style.display = 'none';
    });
  </script>
</body>
</html>
